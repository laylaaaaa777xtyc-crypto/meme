<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>手势圣诞树</title>
    <!-- Tailwind CSS (CDN for simplicity) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Playfair+Display:ital@0;1&family=Mountains+of+Christmas:wght@700&display=swap" rel="stylesheet">
    <style>
      body { margin: 0; background: #000; overflow: hidden; }
      /* Custom scrollbar */
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }

      /* Christmas Snow-Capped Text Effect */
      .christmas-text {
        font-family: 'Cinzel Decorative', cursive;
        
        /* Gradient: Top White (Snow), Middle Red, Bottom Green */
        background: linear-gradient(
          180deg, 
          #ffffff 0%, 
          #ffffff 35%, 
          #d42426 35%, 
          #d42426 70%, 
          #165b33 70%, 
          #165b33 100%
        );
        background-size: 100% 100%;
        
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        color: transparent;

        /* Gold Stroke */
        -webkit-text-stroke: 1px #ffd700;
        
        /* Glow Effect */
        filter: drop-shadow(0 0 5px rgba(212, 36, 38, 0.6));
        
        animation: float-glow 4s ease-in-out infinite;
      }

      @keyframes float-glow {
        0%, 100% {
          transform: translateY(0);
          filter: drop-shadow(0 0 5px rgba(212, 36, 38, 0.5));
        }
        50% {
          transform: translateY(-5px);
          filter: drop-shadow(0 0 15px rgba(255, 215, 0, 0.8));
        }
      }

      /* Bouncing decoration animation */
      .animate-bounce-soft {
        animation: bounce-soft 2s infinite;
      }
      .delay-100 { animation-delay: 0.1s; }
      .delay-200 { animation-delay: 0.2s; }
      .delay-300 { animation-delay: 0.3s; }

      @keyframes bounce-soft {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-4px); }
      }

      .font-serif-custom {
        font-family: 'Playfair Display', serif;
      }
    </style>
