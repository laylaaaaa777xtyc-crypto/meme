<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#000000" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>愿树·漂流</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Playfair+Display:ital@0;1&display=swap" rel="stylesheet">
    <style>
      html, body {
        margin: 0; padding: 0; background: #000;
        overflow: hidden; height: 100%; height: 100dvh;
        -webkit-tap-highlight-color: transparent;
        overscroll-behavior: none;
        touch-action: none;
      }
      #root { height: 100%; height: 100dvh; }
      .touch-none { touch-action: none; -webkit-user-select: none; user-select: none; }
      .font-serif-custom { font-family: 'Playfair Display', serif; }

      /* ── 标题 ── */
      .wish-title {
        font-size: clamp(1.55rem, 6.5vw, 2.2rem);
        font-weight: 700;
        color: #FFD700;
        text-shadow:
          0 0 6px  rgba(255,215,0,1),
          0 0 18px rgba(255,165,0,0.8),
          0 0 36px rgba(255,130,0,0.45);
        letter-spacing: 0.2em;
        animation: wish-pulse 3.5s ease-in-out infinite;
      }
      @keyframes wish-pulse {
        0%,100% { text-shadow: 0 0 6px rgba(255,215,0,1), 0 0 18px rgba(255,165,0,0.8), 0 0 36px rgba(255,130,0,0.45); }
        50%      { text-shadow: 0 0 12px rgba(255,230,0,1),0 0 30px rgba(255,185,0,1),   0 0 55px rgba(255,140,0,0.6); }
      }

      .wish-subtitle {
        font-size: clamp(0.6rem, 2.3vw, 0.76rem);
        color: rgba(255,255,255,0.6);
        letter-spacing: 0.2em;
      }

      /* ── 星星装饰 ── */
      .sdeco { display:inline-block; color:#FFD700; font-size:0.7rem; animation:sdeco-twinkle 2s ease-in-out infinite; text-shadow:0 0 5px rgba(255,215,0,0.9); }
      .sdeco.d1{animation-delay:0.3s} .sdeco.d2{animation-delay:0.7s}
      .sdeco.d3{animation-delay:1.1s} .sdeco.d4{animation-delay:1.6s}
      @keyframes sdeco-twinkle {
        0%,100%{ opacity:.45; transform:scale(.8); }
        50%    { opacity:1;   transform:scale(1.25); }
      }

      /* ── 宝丽来相框 ── */
      .polaroid {
        background: #fff;
        padding: 5px 5px 24px;
        box-shadow: 3px 5px 20px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.08);
        pointer-events: none;
        position: relative;
      }
      .polaroid-tape {
        position: absolute;
        top: -7px; left: 50%;
        transform: translateX(-50%) rotate(-1.5deg);
        width: 32px; height: 13px;
        background: rgba(255,218,70,0.62);
        border-radius: 2px;
      }

      /* ── 音乐按钮 ── */
      .music-btn {
        width: 2.3rem; height: 2.3rem; border-radius:50%;
        border: 1.5px solid rgba(255,215,0,0.55);
        background: rgba(0,0,0,0.55); backdrop-filter:blur(8px);
        display:flex; align-items:center; justify-content:center;
        cursor:pointer; color:#FFD700;
        transition: border-color .2s, box-shadow .2s;
      }
      .music-btn:hover { border-color:rgba(255,215,0,0.9); box-shadow:0 0 10px rgba(255,215,0,0.4); }

      /* ── 动作按钮 green / gold ── */
      .abtn-green {
        width:3.3rem; height:3.3rem; border-radius:50%;
        background: radial-gradient(circle at 40% 35%, #3a9a3a, #004800);
        border:1.5px solid rgba(80,200,80,0.45);
        box-shadow: 0 0 14px rgba(0,160,0,0.55), 0 0 30px rgba(0,110,0,0.3);
        display:flex; align-items:center; justify-content:center; cursor:pointer;
        transition: transform .2s;
      }
      .abtn-green:active { transform:scale(.93); }

      .abtn-gold {
        width:3.3rem; height:3.3rem; border-radius:50%;
        background: radial-gradient(circle at 40% 35%, #FFE040, #B8860B);
        border:1.5px solid rgba(255,230,100,0.6);
        box-shadow: 0 0 14px rgba(255,200,0,0.55), 0 0 30px rgba(180,140,0,0.3);
        display:flex; align-items:center; justify-content:center; cursor:pointer;
        transition: transform .2s;
      }
      .abtn-gold:active { transform:scale(.93); }

      /* ── 背景图片 ── */
      .warm-bg {
        background-image:
          linear-gradient(rgba(5,2,0,0.62), rgba(5,2,0,0.62)),
          url('/bg.png');
        background-size: cover;
        background-position: center center;
        background-repeat: no-repeat;
      }

      /* 动态浮动散景点（CSS 动画） */
      .bokeh-wrap { position:absolute; inset:0; pointer-events:none; overflow:hidden; }
      .bk {
        position: absolute;
        border-radius: 50%;
        filter: blur(18px);
        animation: bk-float 6s ease-in-out infinite;
        opacity: 0;
      }
      @keyframes bk-float {
        0%,100% { opacity:0;    transform: scale(0.8) translateY(0px); }
        40%      { opacity:0.28; transform: scale(1.1) translateY(-8px); }
        60%      { opacity:0.22; transform: scale(1.05) translateY(-4px); }
      }

      /* ── 左侧金色摄像头按钮 ── */
      .cam-gold-btn {
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
        cursor: pointer;
      }
      .cam-gold-circle {
        width: 8rem; height: 8rem;
        border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        background: radial-gradient(circle at 35% 30%, #FFF176, #FFD700 40%, #B07800);
        border: 3px solid rgba(255,235,100,0.85);
        box-shadow:
          0 0 28px  rgba(255,210,0,0.85),
          0 0 60px  rgba(200,155,0,0.55),
          0 0 100px rgba(160,110,0,0.25),
          inset 0 2px 8px rgba(255,255,180,0.4);
        animation: cam-gold-pulse 1.8s ease-in-out infinite;
        transition: transform .15s;
      }
      .cam-gold-circle:active { transform: scale(.88) !important; animation: none; }

      @keyframes cam-gold-pulse {
        0%,100% {
          transform: scale(1);
          box-shadow: 0 0 28px rgba(255,210,0,0.85), 0 0 60px rgba(200,155,0,0.55), 0 0 100px rgba(160,110,0,0.25), inset 0 2px 8px rgba(255,255,180,0.4);
        }
        50% {
          transform: scale(1.22);
          box-shadow: 0 0 48px rgba(255,228,0,1), 0 0 90px rgba(220,175,0,0.75), 0 0 140px rgba(180,130,0,0.4), inset 0 2px 8px rgba(255,255,200,0.5);
        }
      }
      .cam-gold-ring {
        position: absolute; inset: -10px; border-radius: 50%;
        border: 2.5px solid rgba(255,220,0,0.7);
        animation: cam-gold-ring 1.8s ease-out infinite;
        pointer-events: none;
      }
      .cam-gold-ring.r2 { animation-delay: 0.6s; }
      .cam-gold-ring.r3 { animation-delay: 1.2s; }
      @keyframes cam-gold-ring {
        0%   { transform: scale(1);   opacity: 0.85; }
        100% { transform: scale(2.4); opacity: 0; }
      }
      /* 已开启：暗金静止 */
      .cam-gold-on .cam-gold-circle {
        background: radial-gradient(circle at 38% 34%, #9a6600, #4a3000);
        border-color: rgba(160,110,10,0.5);
        box-shadow: 0 0 14px rgba(140,90,0,0.4);
        animation: none;
        transform: scale(1);
      }

      /* ── 气泡提示 ── */
      .cam-bubble {
        position: absolute;
        left: calc(100% + 16px);
        top: 4rem;
        transform: translateY(-50%);
        background: rgba(255,234,80,0.95);
        color: rgba(12,6,0,0.88);
        font-size: 0.75rem;
        font-weight: 800;
        letter-spacing: 0.04em;
        padding: 6px 12px;
        border-radius: 20px;
        white-space: nowrap;
        box-shadow: 0 2px 16px rgba(255,200,0,0.6), 0 0 0 1.5px rgba(255,235,100,0.45);
        animation: bubble-float 1.6s ease-in-out infinite;
        pointer-events: none;
      }
      .cam-bubble::before {
        content: '';
        position: absolute;
        right: 100%;
        top: 50%;
        transform: translateY(-50%);
        width: 0; height: 0;
        border: 6px solid transparent;
        border-right-color: rgba(255,234,80,0.95);
      }
      @keyframes bubble-float {
        0%,100% { transform: translateY(-50%) translateX(0px);  }
        50%      { transform: translateY(-50%) translateX(5px);  }
      }

      ::-webkit-scrollbar { width:6px; }
      ::-webkit-scrollbar-track { background:transparent; }
      ::-webkit-scrollbar-thumb { background:#444; border-radius:3px; }

      /* ══════════════════════════════
         摇树按钮
      ══════════════════════════════ */
      .shake-btn {
        display: flex; flex-direction: column; align-items: center;
        width: 3.3rem; height: 3.3rem; border-radius: 50%;
        background: radial-gradient(circle at 40% 35%, #FFE040, #B8860B);
        border: 1.5px solid rgba(255,230,100,0.6);
        box-shadow: 0 0 14px rgba(255,200,0,0.55), 0 0 30px rgba(180,140,0,0.3);
        cursor: pointer; justify-content: center; gap: 1px;
        transition: transform .15s;
        animation: shake-idle 3s ease-in-out infinite;
      }
      .shake-btn:active { transform: scale(.9) rotate(-8deg) !important; animation: none; }
      @keyframes shake-idle {
        0%,100% { transform: rotate(0deg); }
        15%      { transform: rotate(-6deg); }
        30%      { transform: rotate(5deg); }
        45%      { transform: rotate(-3deg); }
        60%      { transform: rotate(2deg); }
        75%      { transform: rotate(0deg); }
      }

      /* ══════════════════════════════
         运势翻牌
      ══════════════════════════════ */
      .fortune-overlay {
        position: fixed; inset: 0; z-index: 60;
        background: rgba(0,0,0,0.72);
        backdrop-filter: blur(6px);
        display: flex; align-items: center; justify-content: center;
        padding: 24px;
        animation: wd-fade .2s ease;
      }
      .fortune-scene {
        perspective: 900px;
        width: 100%; max-width: 320px;
      }
      .fortune-flipper {
        position: relative;
        width: 100%; height: 380px;
        transform-style: preserve-3d;
        transition: transform .8s cubic-bezier(.4,0,.2,1);
      }
      .fortune-flipper.is-flipped { transform: rotateY(180deg); }
      .fortune-face {
        position: absolute; inset: 0;
        border-radius: 22px;
        backface-visibility: hidden;
        -webkit-backface-visibility: hidden;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        padding: 28px 24px;
        background: linear-gradient(148deg, rgba(18,8,1,0.97), rgba(8,3,0,0.98));
        border: 1.5px solid rgba(255,205,70,0.22);
      }
      .fortune-back { transform: rotateY(180deg); justify-content: flex-start; padding-top: 36px; }
      .fortune-close {
        position: absolute; top: 12px; right: 14px;
        background: none; border: none; color: rgba(255,255,255,0.35);
        font-size: 1.5rem; cursor: pointer; padding: 4px 8px;
      }
      .fortune-sparkle-ring {
        position: absolute; inset: 20px; border-radius: 50%;
        border: 1.5px solid;
        animation: fsr-spin 3s linear infinite;
        opacity: .4;
      }
      .fortune-sparkle-ring.r2 { inset: 30px; animation-direction: reverse; animation-duration: 4s; }
      @keyframes fsr-spin { to { transform: rotate(360deg); } }
      .fortune-front-emoji { font-size: 3rem; margin-bottom: 12px; animation: fe-pulse 1.5s ease-in-out infinite; }
      @keyframes fe-pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.18)} }
      .fortune-front-label { font-size: 1rem; font-weight: 700; letter-spacing: .1em; margin-bottom: 8px; }
      .fortune-front-hint  { font-size: .7rem; color: rgba(255,255,255,.3); letter-spacing: .18em; }
      .fortune-back-emoji  { font-size: 2rem; margin-bottom: 8px; }
      .fortune-back-label  { font-size: .8rem; font-weight: 700; letter-spacing: .12em; margin-bottom: 12px; }
      .fortune-divider     { width: 40px; height: 1.5px; border-radius: 1px; margin-bottom: 18px; opacity: .6; }
      .fortune-text {
        font-size: 1.05rem; color: rgba(255,255,255,.9);
        text-align: center; line-height: 1.85; font-style: italic;
        letter-spacing: .02em; margin-bottom: 28px;
        text-shadow: 0 0 12px rgba(255,200,80,.2);
      }
      .fortune-share-btn {
        width: 100%; padding: 13px; border-radius: 13px; border: none;
        font-size: .95rem; font-weight: 800; letter-spacing: .1em;
        color: rgba(10,4,0,.88); cursor: pointer;
        box-shadow: 0 0 20px rgba(255,175,0,.45);
        transition: transform .15s;
      }
      .fortune-share-btn:active { transform: scale(.96); }

      /* ══════════════════════════════
         漂流愿望卡片
      ══════════════════════════════ */
      .drift-card {
        position: absolute;
        top: -90px;
        transform: translateX(-50%);
        width: 160px;
        background: rgba(18,8,1,0.82);
        border: 1px solid rgba(255,205,70,0.28);
        border-radius: 14px;
        padding: 10px 12px 8px;
        backdrop-filter: blur(6px);
        box-shadow: 0 4px 20px rgba(0,0,0,0.55), 0 0 0 .5px rgba(255,200,60,.12);
        animation: drift-fall linear forwards;
      }
      @keyframes drift-fall {
        0%   { top: -90px; opacity: 0; }
        8%   { opacity: 1; }
        90%  { opacity: 1; }
        100% { top: 110vh; opacity: 0; }
      }
      .drift-text {
        font-size: .72rem; color: rgba(255,255,255,.82);
        line-height: 1.6; font-style: italic;
        margin-bottom: 8px; word-break: break-all;
      }
      .drift-heart {
        display: flex; align-items: center; gap: 4px;
        background: none; border: none; cursor: pointer;
        font-size: .75rem; color: rgba(255,255,255,.5);
        padding: 0; transition: color .2s;
      }
      .drift-heart.hearted { color: #FF6B9D; }
      .drift-heart-count { font-size: .68rem; }

      /* ══════════════════════════════
         手势特效层
      ══════════════════════════════ */
      .gesture-effect-layer {
        position: absolute; inset: 0; pointer-events: none; overflow: hidden;
      }

      /* 爱心雨 */
      .falling-heart {
        position: absolute;
        top: -40px;
        color: #FF6B9D;
        text-shadow: 0 0 8px rgba(255,107,157,0.8);
        animation: heart-fall ease-in forwards;
      }
      @keyframes heart-fall {
        0%   { top: -40px; opacity: 0; transform: rotate(var(--rotate, 0deg)) scale(.8); }
        10%  { opacity: 1; }
        85%  { opacity: 1; }
        100% { top: 110vh;  opacity: 0; transform: rotate(var(--rotate, 0deg)) scale(1.1) translateX(20px); }
      }

      /* 金色粒子爆发 */
      .gold-spark {
        position: absolute;
        color: #FFD700;
        text-shadow: 0 0 8px rgba(255,215,0,0.9);
        animation: gold-burst .9s ease-out forwards;
      }
      @keyframes gold-burst {
        0%   { transform: translate(0,0) scale(0); opacity: 1; }
        60%  { opacity: 1; }
        100% { transform: translate(var(--tx,0), var(--ty,0)) scale(1.2); opacity: 0; }
      }

      /* 绿色波纹 */
      .green-ring {
        position: absolute;
        width: 80px; height: 80px;
        border-radius: 50%;
        border: 2px solid #4ADE80;
        box-shadow: 0 0 14px rgba(74,222,128,0.6);
        animation: green-wave 1.4s ease-out forwards;
      }
      @keyframes green-wave {
        0%   { transform: scale(1);   opacity: .9; }
        100% { transform: scale(6);   opacity: 0;  }
      }


      /* ══════════════════════════════
         许愿弹窗 (wish input dialog)
      ══════════════════════════════ */
      .wish-dialog-overlay {
        position: fixed; inset: 0; z-index: 60;
        background: rgba(0,0,0,0.72);
        backdrop-filter: blur(5px);
        display: flex; align-items: center; justify-content: center;
        padding: 24px;
        animation: wd-fade 0.2s ease;
      }
      @keyframes wd-fade { from { opacity:0; } to { opacity:1; } }

      .wish-dialog-card {
        position: relative;
        width: 100%; max-width: 360px;
        background: linear-gradient(148deg, rgba(30,14,2,0.97), rgba(16,6,0,0.98));
        border: 1.5px solid rgba(255,205,70,0.3);
        border-radius: 22px;
        padding: 28px 24px 22px;
        box-shadow: 0 0 50px rgba(255,160,0,0.18), 0 24px 60px rgba(0,0,0,0.75);
        animation: wd-up 0.3s cubic-bezier(0.34,1.5,0.64,1);
      }
      @keyframes wd-up {
        from { opacity:0; transform: translateY(28px) scale(0.95); }
        to   { opacity:1; transform: translateY(0)    scale(1);    }
      }

      .wish-dialog-cancel {
        position: absolute; top:12px; right:14px;
        background: none; border: none;
        color: rgba(255,255,255,0.35); font-size: 1.5rem;
        cursor: pointer; padding: 4px 8px; line-height: 1;
      }
      .wish-dialog-cancel:hover { color: rgba(255,255,255,0.65); }

      .wish-dialog-title {
        font-size: clamp(0.88rem,4vw,1rem);
        font-weight: 700; color: #FFD700;
        text-align: center; letter-spacing: 0.04em;
        margin-bottom: 5px;
        text-shadow: 0 0 14px rgba(255,195,0,0.55);
      }
      .wish-dialog-sub {
        font-size: 0.7rem; color: rgba(255,255,255,0.38);
        text-align: center; letter-spacing: 0.14em; margin-bottom: 18px;
      }
      .wish-dialog-input {
        width: 100%; box-sizing: border-box;
        background: rgba(255,255,255,0.04);
        border: 1px solid rgba(255,195,70,0.22);
        border-radius: 13px;
        padding: 12px 14px;
        color: rgba(255,255,255,0.88);
        font-size: 0.9rem;
        font-family: 'Playfair Display', serif;
        outline: none; resize: none;
        line-height: 1.55; min-height: 78px;
        transition: border-color 0.2s;
      }
      .wish-dialog-input:focus { border-color: rgba(255,200,80,0.5); }
      .wish-dialog-input::placeholder { color: rgba(255,255,255,0.26); font-style: italic; }

      .wish-dialog-btn {
        width: 100%; margin-top: 14px; padding: 13px;
        border-radius: 13px; border: none; cursor: pointer;
        background: linear-gradient(135deg, #FFE040 0%, #FF9200 100%);
        color: rgba(18,6,0,0.9);
        font-size: 1rem; font-weight: 800; letter-spacing: 0.1em;
        box-shadow: 0 0 22px rgba(255,175,0,0.55);
        transition: transform 0.15s, box-shadow 0.15s;
      }
      .wish-dialog-btn:active  { transform: scale(0.96); }
      .wish-dialog-btn:disabled { opacity: 0.38; cursor: not-allowed; }

    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",

    "@react-three/fiber": "https://esm.sh/@react-three/fiber@^9.5.0",
    "@react-three/drei": "https://esm.sh/@react-three/drei@^10.7.7",

    "three": "https://esm.sh/three@^0.182.0",

  }
}
</script>
</head>

    <div id="root"></div>

</html>
